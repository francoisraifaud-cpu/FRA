# Reverse proxy public (port 80) → API FastAPI sur 127.0.0.1:8000
# Rate limiting par IP pour limiter l’abus. Déployé : /etc/nginx/sites-available/astro-api-proxy
#
# Doc dépôt : FRA/API SE/README.md, JOURNAL-OPERATIONS.md, INVENTAIRE-SERVEUR-ASTRO-SWISSEPH-GOTENBERG.md
#
# Après migration des clients : vous pouvez retirer l’accès direct UFW au port 8000 et ne
# passer que par http://IP/ (port 80).

limit_req_zone $binary_remote_addr zone=astro_api:10m rate=25r/s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 4m;

    location / {
        limit_req zone=astro_api burst=60 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
