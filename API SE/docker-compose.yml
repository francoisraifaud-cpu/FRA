# Source de vérité (dépôt) — Gotenberg pour astro-server.
# Déploiement : copier ce fichier vers /opt/astro/docker-compose.yml sur la VM, puis :
#   cd /opt/astro && docker compose pull && docker compose up -d
#
# Port public attendu : 3000 (voir UFW + INVENTAIRE-SERVEUR-ASTRO-SWISSEPH-GOTENBERG.md).
# Limites mémoire + rotation logs (Compose file format / plugin v2).

services:
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: always
    ports:
      - "3000:3000"
    mem_limit: "1536m"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "4"
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=false"
      - "--chromium-allow-list=.*"
